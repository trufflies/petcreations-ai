services:
  - type: web
    name: petcreations-ai
    runtime: python
    plan: starter          # $7/mo, no cold starts. Use "free" to trial (spins down when idle).
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set in the Render dashboard (don't commit keys)
      - key: OPENAI_API_KEY
        sync: false
